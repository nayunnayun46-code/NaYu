<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>American Roulette</title>
  <style>
    :root{
      --bg:#0b0f14; --fg:#e5e7eb; --mut:#94a3b8;
      --card:rgba(255,255,255,.03); --line:rgba(255,255,255,.10);
      --btn:rgba(255,255,255,.06); --btnLine:rgba(255,255,255,.12);
      --warn:#f59e0b; --ok:#22c55e; --bad:#ef4444;
    }
    body{font-family:system-ui,Segoe UI,Roboto,"Noto Sans KR"; background:var(--bg); color:var(--fg); margin:0; padding:16px;}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .space{justify-content:space-between;}
    .card{margin-top:12px; padding:14px; border:1px solid var(--line); border-radius:16px; background:var(--card);}
    .big{font-size:20px; font-weight:1000;}
    .muted{color:var(--mut); font-size:13px;}
    button,input,select{
      padding:10px 12px; border-radius:12px; border:1px solid var(--btnLine);
      background:var(--btn); color:var(--fg); font-weight:900;
    }
    button{cursor:pointer;}
    button:disabled{opacity:.45; cursor:not-allowed;}
    .pill{
      display:inline-flex; gap:8px; align-items:center;
      padding:8px 10px; border-radius:999px;
      border:1px solid var(--btnLine);
      background:rgba(255,255,255,.04);
      font-weight:900;
    }
    .tag{font-size:12px; font-weight:1000; padding:4px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.14);}
    .tag.ok{color:var(--ok); border-color:rgba(34,197,94,.35); background:rgba(34,197,94,.10);}
    .tag.bad{color:var(--bad); border-color:rgba(239,68,68,.35); background:rgba(239,68,68,.10);}

    /* Wheel */
    .wheelWrap{ display:flex; justify-content:center; margin-top:10px; }
    .wheelFrame{
      width:320px;height:320px;border-radius:999px;position:relative;overflow:hidden;
      border:2px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.02);
      display:grid;place-items:center;
    }
    .pointer{
      position:absolute; top:-6px; left:50%; transform:translateX(-50%);
      width:0;height:0; border-left:14px solid transparent; border-right:14px solid transparent;
      border-bottom:26px solid var(--warn);
      filter:drop-shadow(0 4px 6px rgba(0,0,0,.5));
      z-index:5;
    }
    .wheel{
      width:292px;height:292px;border-radius:999px;
      box-shadow: inset 0 0 0 10px rgba(0,0,0,.35);
      transform: rotate(0deg);
      transition: transform 1600ms cubic-bezier(.17,.89,.23,1);
      position:relative;
    }
    .sliceLabel{
      position:absolute; left:50%; top:50%; transform-origin:0 0; width:0;height:0;
      pointer-events:none;
    }
    .sliceLabel span{
      display:inline-block; transform:translate(122px,-10px);
      font-size:12px; font-weight:1000; color:rgba(255,255,255,.95);
      text-shadow:0 1px 0 rgba(0,0,0,.55);
    }
    .hub{
      position:absolute; width:110px;height:110px;border-radius:999px; z-index:2;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      border:1px solid rgba(255,255,255,0.10);
      display:grid; place-items:center; text-align:center; padding:10px;
    }
    .hubNum{ font-size:26px; font-weight:1000; color:var(--fg); line-height:1; }
    .hubTag{ margin-top:6px; font-size:12px; font-weight:1000; color:var(--mut); }

    /* Betting grid */
    .grid{display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-top:10px;}
    .cell{
      padding:12px 10px; border-radius:14px; border:1px solid rgba(255,255,255,.10);
      cursor:pointer; user-select:none; text-align:center; font-weight:1000; position:relative;
    }
    .cell.red{background:rgba(239,68,68,.15)}
    .cell.black{background:rgba(17,24,39,.7)}
    .cell.green{background:rgba(34,197,94,.16)}
    .badge{
      position:absolute; right:8px; top:8px; font-size:11px; padding:3px 7px; border-radius:999px;
      border:1px solid rgba(245,158,11,.35); background:rgba(245,158,11,.18); display:none;
    }

    table{width:100%; border-collapse:collapse; margin-top:10px;}
    th,td{padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left;}
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;}
  </style>
</head>
<body>
  <div class="row space">
    <div class="row">
      <div class="big">🎲 American Roulette</div>
      <div class="muted" id="status">준비됨</div>
    </div>
    <div class="row">
      <select id="role">
        <option value="player" selected>Player</option>
        <option value="dealer">Dealer</option>
      </select>
      <input id="name" placeholder="닉네임" maxlength="16" />
      <button id="join">입장</button>
      <button id="resetAll" title="전체 초기화">전체 리셋</button>
    </div>
  </div>

  <div class="card">
    <div class="row space">
      <div class="muted" id="stateLine">라운드 - | 상태 - | 결과 -</div>
      <div class="row">
        <div class="pill"><span class="muted">내 잔액</span><span id="myBal">0</span></div>
        <div class="pill"><span class="muted">최근 손익</span><span id="myNet">0</span></div>
      </div>
    </div>

    <div class="wheelWrap">
      <div class="wheelFrame">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <div class="hub">
          <div class="hubNum" id="wheelNum">—</div>
          <div class="hubTag" id="wheelTag">READY</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card" id="dealerCard" style="display:none;">
    <div class="row space">
      <div class="big">딜러 조작</div>
      <div class="row">
        <span id="dealerLockTag" class="tag bad">잠김</span>
      </div>
    </div>

    <div class="row" style="margin-top:10px;">
      <input id="dealerPin" placeholder="딜러 PIN" type="password" inputmode="numeric" maxlength="8" />
      <button id="dealerUnlock">잠금 해제</button>
      <div class="muted" id="dealerLockState">PIN 필요</div>
    </div>

    <div class="row" style="margin-top:10px;">
      <button id="dOpen">OPEN(배팅 받기)</button>
      <button id="dClose">CLOSE(마감)</button>
      <select id="dResult"><option value="">결과 선택</option></select>
      <button id="dSpin">SPIN(결과 확정/정산)</button>
      <button id="dNext">다음 라운드</button>
    </div>

    <div class="big" style="margin-top:14px;">플레이어 현황</div>
    <table>
      <thead>
        <tr><th>이름</th><th>잔액</th><th>배팅수</th><th>배팅합</th><th>최근 손익</th></tr>
      </thead>
      <tbody id="dealerTable"></tbody>
    </table>
  </div>

  <div class="card" id="playerCard">
    <div class="big">배팅</div>
    <div class="row" style="margin-top:10px;">
      <select id="chip">
        <option value="100">100</option>
        <option value="500">500</option>
        <option value="1000" selected>1000</option>
        <option value="5000">5000</option>
      </select>
      <select id="mode">
        <option value="straight">한칸(스트레이트) 36배</option>
        <option value="split">2칸(스플릿) 18배</option>
        <option value="corner">4칸(코너) 9배</option>
      </select>
      <button id="clear">배팅 초기화</button>
    </div>

    <div class="row" style="margin-top:10px;">
      <button id="bRed">레드 2배</button>
      <button id="bBlack">블랙 2배</button>
      <button id="bOdd">홀 2배</button>
      <button id="bEven">짝 2배</button>
      <button id="bD1">1-12 3배</button>
      <button id="bD2">13-24 3배</button>
      <button id="bD3">25-36 3배</button>
      <button id="bC1">1열 3배</button>
      <button id="bC2">2열 3배</button>
      <button id="bC3">3열 3배</button>
    </div>

    <div class="row" style="margin-top:12px;">
      <div class="cell green" data-n="0" style="flex:1">0<span class="badge"></span></div>
      <div class="cell green" data-n="00" style="flex:1">00<span class="badge"></span></div>
    </div>
    <div class="grid" id="grid"></div>

    <div class="muted" style="margin-top:10px" id="hint">
      입장 후 OPEN 상태에서 배팅 가능. 0/00은 스트레이트만.
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="big">내 배팅 내역(이번 라운드)</div>
      <div class="muted mono" id="myBets">-</div>
    </div>
  </div>

<script>
(() => {
  // ===== Config =====
  const DEALER_PIN = "4323";

  // ===== Game data =====
  const REDS = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
  const PAY = { straight:36, split:18, corner:9, evenmoney:2, dozen:3, column:3 };
  const WHEEL_ORDER = ["0","28","9","26","30","11","7","20","32","17","5","22","34","15","3","24","36","13","1","00","27","10","25","29","12","8","19","31","18","6","21","33","16","4","23","35","14","2"];

  const fmt = n => Number(n).toLocaleString("ko-KR");
  const uid = () => Math.random().toString(36).slice(2,10);
  const now = () => Date.now();

  function colorOf(n){
    if (n==="0"||n==="00") return "GREEN";
    return REDS.has(Number(n)) ? "RED" : "BLACK";
  }
  function gridColor(n){
    if (n==="0"||n==="00") return "green";
    return REDS.has(Number(n)) ? "red" : "black";
  }
  function posOf(n){
    const x = Number(n); const idx = x-1;
    return { r: Math.floor(idx/3), c: idx%3 };
  }
  function isAdj(a,b){
    const pa=posOf(a), pb=posOf(b);
    const dr=Math.abs(pa.r-pb.r), dc=Math.abs(pa.c-pb.c);
    return (dr===0&&dc===1)||(dr===1&&dc===0);
  }

  // ===== Sync layer =====
  const channelName = "roulette-room-v1";
  const bc = new BroadcastChannel(channelName);

  const LS_KEY = "roulette_state_v1";
  const defaultState = () => ({
    ver: 1,
    phase: "OPEN",
    round: 1,
    result: null,
    dealerId: null,
    updatedAt: now(),
    players: {}
  });

  function loadState(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return defaultState();
      const s = JSON.parse(raw);
      if (!s || s.ver !== 1) return defaultState();
      return s;
    } catch {
      return defaultState();
    }
  }
  function saveState(s){
    s.updatedAt = now();
    localStorage.setItem(LS_KEY, JSON.stringify(s));
  }
  let state = loadState();

  function broadcast(type, payload){
    bc.postMessage({ type, payload, from: myId, at: now() });
  }

  // ===== UI refs =====
  const elStatus = document.getElementById("status");
  const elRole = document.getElementById("role");
  const elName = document.getElementById("name");
  const elJoin = document.getElementById("join");
  const elResetAll = document.getElementById("resetAll");

  const elStateLine = document.getElementById("stateLine");
  const elMyBal = document.getElementById("myBal");
  const elMyNet = document.getElementById("myNet");
  const elMyBets = document.getElementById("myBets");

  const dealerCard = document.getElementById("dealerCard");
  const playerCard = document.getElementById("playerCard");
  const dealerTable = document.getElementById("dealerTable");

  const dealerPinEl = document.getElementById("dealerPin");
  const dealerUnlockBtn = document.getElementById("dealerUnlock");
  const dealerLockState = document.getElementById("dealerLockState");
  const dealerLockTag = document.getElementById("dealerLockTag");

  const dOpen = document.getElementById("dOpen");
  const dClose = document.getElementById("dClose");
  const dResult = document.getElementById("dResult");
  const dSpin = document.getElementById("dSpin");
  const dNext = document.getElementById("dNext");

  const chipEl = document.getElementById("chip");
  const modeEl = document.getElementById("mode");
  const clearBtn = document.getElementById("clear");
  const hintEl = document.getElementById("hint");

  const bRed = document.getElementById("bRed");
  const bBlack = document.getElementById("bBlack");
  const bOdd = document.getElementById("bOdd");
  const bEven = document.getElementById("bEven");
  const bD1 = document.getElementById("bD1");
  const bD2 = document.getElementById("bD2");
  const bD3 = document.getElementById("bD3");
  const bC1 = document.getElementById("bC1");
  const bC2 = document.getElementById("bC2");
  const bC3 = document.getElementById("bC3");

  const gridEl = document.getElementById("grid");

  const wheel = document.getElementById("wheel");
  const wheelNum = document.getElementById("wheelNum");
  const wheelTag = document.getElementById("wheelTag");

  // ===== Identity =====
  const myId = (localStorage.getItem("roulette_myid_v1") || (() => {
    const id = uid();
    localStorage.setItem("roulette_myid_v1", id);
    return id;
  })());

  let isJoined = false;
  let myRole = "player";
  let splitFirst = null;

  // ===== Dealer lock =====
  let dealerUnlocked = false;

  function isDealer(){
    return dealerUnlocked && myRole === "dealer" && state.dealerId === myId;
  }

  function canBecomeDealer(){
    // PIN이 맞고, 아직 딜러가 없을 때만 딜러 점유
    return dealerUnlocked && myRole === "dealer" && !state.dealerId;
  }

  function updateDealerLockUI(){
    if (dealerUnlocked){
      dealerLockTag.className = "tag ok";
      dealerLockTag.textContent = "해제됨";
      dealerLockState.textContent = (state.dealerId === myId) ? "딜러 권한 활성" : (!state.dealerId ? "딜러 대기(점유 가능)" : "다른 딜러가 점유 중");
    } else {
      dealerLockTag.className = "tag bad";
      dealerLockTag.textContent = "잠김";
      dealerLockState.textContent = "PIN 필요";
    }
  }

  dealerUnlockBtn.onclick = () => {
    if ((dealerPinEl.value || "").trim() === DEALER_PIN){
      dealerUnlocked = true;

      // PIN 해제 후, 딜러가 없으면 이 탭이 딜러를 점유
      if (myRole === "dealer" && !state.dealerId){
        state.dealerId = myId;
        saveState(state);
        broadcast("state_sync", { state });
      }

      updateDealerLockUI();
      renderState();
    } else {
      dealerUnlocked = false;
      updateDealerLockUI();
      alert("PIN 틀림");
      renderState();
    }
  };

  // ===== Local badges from my bets =====
  const localTotals = new Map();
  function recomputeLocalBadges(){
    localTotals.clear();
    const me = state.players[myId];
    if (!me) return;
    for (const b of me.bets){
      for (const n of b.nums){
        localTotals.set(n, (localTotals.get(n)||0) + b.amount);
      }
    }
  }
  function renderBadges(){
    document.querySelectorAll(".cell").forEach(cell=>{
      const n = cell.dataset.n;
      const b = cell.querySelector(".badge");
      const v = localTotals.get(n) || 0;
      if (v>0){ b.style.display="inline-block"; b.textContent=fmt(v); }
      else { b.style.display="none"; b.textContent=""; }
    });
  }

  // ===== UI lock for player controls =====
  function setLocked(locked){
    const nodes = playerCard.querySelectorAll("button, select, .cell");
    nodes.forEach(el=>{
      if (el.id === "join" || el.id === "name") return;
      if (el.tagName === "BUTTON" || el.tagName === "SELECT") el.disabled = locked;
      el.style.opacity = locked ? "0.45" : "1";
      el.style.pointerEvents = locked ? "none" : "auto";
    });
    elJoin.disabled = false;
    elName.disabled = false;
  }

  // ===== Wheel rendering =====
  let wheelAngle = 0;

  function renderWheel(){
    const slice = 360 / WHEEL_ORDER.length;
    const stops = [];
    for (let i=0;i<WHEEL_ORDER.length;i++){
      const n = WHEEL_ORDER[i];
      const c = (n==="0"||n==="00")
        ? "rgba(34,197,94,.85)"
        : (REDS.has(Number(n)) ? "rgba(239,68,68,.85)" : "rgba(17,24,39,.92)");
      stops.push(`${c} ${(i*slice).toFixed(4)}deg ${((i+1)*slice).toFixed(4)}deg`);
    }
    wheel.style.background = `conic-gradient(from -90deg, ${stops.join(",")})`;

    wheel.innerHTML = "";
    for (let i=0;i<WHEEL_ORDER.length;i++){
      const n = WHEEL_ORDER[i];
      const lbl = document.createElement("div");
      lbl.className = "sliceLabel";
      lbl.style.transform = `translate(-50%,-50%) rotate(${(-90 + i*slice)}deg)`;
      const s = document.createElement("span");
      s.textContent = n;
      lbl.appendChild(s);
      wheel.appendChild(lbl);
    }
  }

  function spinToResult(result){
    const r = String(result);
    const idx = WHEEL_ORDER.indexOf(r);
    if (idx < 0) return;

    const slice = 360 / WHEEL_ORDER.length;
    const target = (360 - (idx * slice)) % 360;
    const extraTurns = 5 * 360;

    wheelAngle = (Math.floor(wheelAngle/360) * 360) + extraTurns + target;
    wheel.style.transform = `rotate(${wheelAngle}deg)`;
    wheelNum.textContent = r;
    wheelTag.textContent = colorOf(r);
  }

  // ===== Betting sets =====
  const numsRed = () => Array.from({length:36},(_,i)=>String(i+1)).filter(x=>REDS.has(Number(x)));
  const numsBlack = () => Array.from({length:36},(_,i)=>String(i+1)).filter(x=>!REDS.has(Number(x)));
  const numsOdd = () => Array.from({length:36},(_,i)=>String(i+1)).filter(x=>Number(x)%2===1);
  const numsEven = () => Array.from({length:36},(_,i)=>String(i+1)).filter(x=>Number(x)%2===0);
  const numsDozen = (a,b) => Array.from({length:b-a+1},(_,i)=>String(a+i));
  const numsColumn = (col) => {
    const out=[]; for(let n=1;n<=36;n++) if(((n-1)%3)===(col-1)) out.push(String(n));
    return out;
  };

  // ===== Game logic =====
  function settleAll(result){
    state.result = String(result);

    for (const pid of Object.keys(state.players)){
      const p = state.players[pid];
      let totalBet = 0;
      let totalPayout = 0;

      for (const b of p.bets){
        totalBet += b.amount;
        const win = b.nums.map(String).includes(String(result));
        if (win) totalPayout += b.amount * b.multiplier;
      }

      const net = totalPayout - totalBet;
      p.balance += net;
      p.lastNet = net;
    }

    state.phase = "SETTLED";
    saveState(state);
  }

  function startNextRound(){
    state.round += 1;
    state.phase = "OPEN";
    state.result = null;
    for (const pid of Object.keys(state.players)){
      state.players[pid].bets = [];
      state.players[pid].lastNet = 0;
    }
    saveState(state);
  }

  function dealerSetPhase(nextPhase){
    if (!isDealer()) { alert("딜러 권한 없음(잠금 해제 필요)"); return; }
    state.phase = nextPhase;
    if (nextPhase === "OPEN") state.result = null;
    saveState(state);
    broadcast("state_sync", { state });
  }

  // ===== Player actions =====
  function mustBeReady(){
    if (!isJoined) return "먼저 입장해.";
    if (state.phase !== "OPEN") return "지금은 배팅 시간이 아님.";
    if (!state.dealerId) return "딜러가 아직 없음.";
    return null;
  }

  function requestPlaceBet(bet){
    const err = mustBeReady();
    if (err){ alert(err); return; }
    broadcast("bet_request", { bet, round: state.round, toDealer: state.dealerId });
  }

  function placeSide(label, nums, multiplier){
    const amount = Number(chipEl.value);
    requestPlaceBet({ label, nums, amount, multiplier });
  }

  function placeOnNumber(n){
    const err = mustBeReady();
    if (err){ alert(err); return; }

    const mode = modeEl.value;
    const amount = Number(chipEl.value);

    if (mode === "straight"){
      requestPlaceBet({ label:`스트레이트[${n}]`, nums:[n], amount, multiplier: PAY.straight });
      return;
    }

    if (mode === "split"){
      if (n==="0"||n==="00"){ alert("0/00 스플릿 불가"); return; }
      if (!splitFirst){
        splitFirst = n;
        hintEl.textContent = `스플릿 1번째: ${splitFirst} (인접 숫자 1개 더 클릭)`;
        return;
      }
      const a=splitFirst; splitFirst=null;
      if (!isAdj(a,n)){ alert(`${a} 와 ${n} 은 인접이 아님`); return; }
      const nums=[a,n].sort((x,y)=>Number(x)-Number(y));
      requestPlaceBet({ label:`스플릿[${nums.join(",")}]`, nums, amount, multiplier: PAY.split });
      return;
    }

    if (mode === "corner"){
      if (n==="0"||n==="00"){ alert("0/00 코너 불가"); return; }
      const p = posOf(n);
      if (p.c>=2 || p.r>=11){ alert(`${n}은 코너 기준점 불가`); return; }
      const nn=Number(n);
      const nums=[String(nn),String(nn+1),String(nn+3),String(nn+4)];
      requestPlaceBet({ label:`코너[${nums.join(",")}]`, nums, amount, multiplier: PAY.corner });
      return;
    }
  }

  // ===== Dealer validates & accepts bet =====
  function dealerAcceptBet(fromId, payload){
    if (!isDealer()) return;

    const { bet, round, toDealer } = payload;
    if (toDealer !== myId) return;
    if (round !== state.round) {
      broadcast("bet_reply", { ok:false, to:fromId, message:"라운드가 바뀜. 다시 배팅해." });
      return;
    }
    if (state.phase !== "OPEN"){
      broadcast("bet_reply", { ok:false, to:fromId, message:"배팅 마감" });
      return;
    }
    const p = state.players[fromId];
    if (!p){
      broadcast("bet_reply", { ok:false, to:fromId, message:"입장 필요" });
      return;
    }

    const amount = Number(bet.amount);
    const multiplier = Number(bet.multiplier);
    const nums = Array.isArray(bet.nums) ? bet.nums.map(String) : [];
    if (!Number.isFinite(amount) || amount <= 0 || amount > 1_000_000){
      broadcast("bet_reply", { ok:false, to:fromId, message:"금액 오류" }); return;
    }
    if (![PAY.straight, PAY.split, PAY.corner, PAY.evenmoney, PAY.dozen, PAY.column].includes(multiplier)){
      broadcast("bet_reply", { ok:false, to:fromId, message:"배당 오류" }); return;
    }
    if (nums.length < 1){
      broadcast("bet_reply", { ok:false, to:fromId, message:"대상 없음" }); return;
    }
    if ((multiplier === PAY.evenmoney || multiplier === PAY.dozen || multiplier === PAY.column) &&
        (nums.includes("0") || nums.includes("00"))){
      broadcast("bet_reply", { ok:false, to:fromId, message:"0/00은 해당 배팅 불가" }); return;
    }

    p.bets.push({
      label: String(bet.label || "BET").slice(0,40),
      nums,
      amount,
      multiplier
    });

    saveState(state);
    broadcast("bet_reply", { ok:true, to:fromId, message:"배팅 접수", state });
    broadcast("state_sync", { state });
  }

  // ===== Rendering =====
  function renderGrid(){
    gridEl.innerHTML = "";
    for (let i=1;i<=36;i++){
      const n = String(i);
      const div = document.createElement("div");
      div.className = `cell ${gridColor(n)}`;
      div.dataset.n = n;
      div.textContent = n;
      const badge = document.createElement("span");
      badge.className = "badge";
      div.appendChild(badge);
      div.addEventListener("click", () => placeOnNumber(n));
      gridEl.appendChild(div);
    }
    document.querySelectorAll('[data-n="0"],[data-n="00"]').forEach(el=>{
      el.addEventListener("click", ()=> placeOnNumber(el.dataset.n));
    });
  }

  function renderDealerResultOptions(){
    dResult.innerHTML = `<option value="">결과 선택</option>`;
    for (const v of ["0","00", ...Array.from({length:36},(_,i)=>String(i+1))]){
      const opt = document.createElement("option");
      opt.value = v; opt.textContent = v;
      dResult.appendChild(opt);
    }
  }

  function renderState(){
    elStatus.textContent = "준비됨";
    elStateLine.textContent = `라운드 ${state.round} | 상태 ${state.phase} | 결과 ${state.result ?? "-"}`;

    dealerCard.style.display = (myRole === "dealer") ? "block" : "none";

    const me = state.players[myId];
    elMyBal.textContent = fmt(me?.balance ?? 0);
    elMyNet.textContent = (me?.lastNet >= 0 ? "+" : "") + fmt(me?.lastNet ?? 0);

    if (!isJoined){
      hintEl.textContent = "닉네임 입력 후 '입장'을 눌러.";
      setLocked(true);
    } else if (state.phase !== "OPEN"){
      hintEl.textContent = "배팅 마감. 결과 대기.";
      setLocked(true);
    } else {
      hintEl.textContent = "배팅 가능.";
      setLocked(false);
    }

    if (me){
      elMyBets.textContent = me.bets.length
        ? me.bets.map(b => `${b.label} | x${b.multiplier} | ${fmt(b.amount)} | [${b.nums.join(",")}]`).join("\n")
        : "-";
    } else {
      elMyBets.textContent = "-";
    }

    recomputeLocalBadges();
    renderBadges();

    dealerTable.innerHTML = "";
    if (myRole === "dealer"){
      for (const [pid, p] of Object.entries(state.players)){
        const betCount = p.bets.length;
        const betSum = p.bets.reduce((s,b)=>s+b.amount,0);
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${p.name}</td><td>${fmt(p.balance)}</td><td>${betCount}</td><td>${fmt(betSum)}</td><td>${(p.lastNet>=0?"+":"")+fmt(p.lastNet||0)}</td>`;
        dealerTable.appendChild(tr);
      }
    }

    updateDealerLockUI();

    // 딜러 버튼 활성 조건
    if (myRole === "dealer"){
      const ok = isDealer();
      dOpen.disabled = !ok || state.phase === "OPEN";
      dClose.disabled = !ok || state.phase !== "OPEN";
      dSpin.disabled = !ok || state.phase !== "CLOSED" || !dResult.value;
      dNext.disabled = !ok || state.phase === "OPEN";
    }
  }

  // ===== Join / role =====
  function registerSelf(){
    const name = (elName.value.trim() || (myRole==="dealer" ? "DEALER" : "Player")).slice(0,16);
    myRole = elRole.value;

    // player record
    if (!state.players[myId]){
      state.players[myId] = { name, balance: 0, lastNet: 0, bets: [] };
    } else {
      state.players[myId].name = name;
    }

    // 딜러는 PIN 해제 전에는 dealerId를 점유하지 않음
    // (PIN 해제 버튼 눌렀을 때만 dealerId 점유 가능)
    if (myRole !== "dealer" && state.dealerId === myId){
      // 혹시 이전에 딜러였다가 player로 바꾼 경우: 딜러 유지하지 않음
      state.dealerId = null;
    }

    saveState(state);
    isJoined = true;
    broadcast("state_sync", { state });
    renderState();
  }

  // ===== Events =====
  elJoin.onclick = registerSelf;

  elRole.onchange = () => {
    myRole = elRole.value;
    dealerCard.style.display = (myRole === "dealer") ? "block" : "none";
    renderState();
  };

  elResetAll.onclick = () => {
    if (!confirm("정말 전체 리셋?")) return;
    state = defaultState();
    saveState(state);
    broadcast("hard_reset", {});
    location.reload();
  };

  clearBtn.onclick = () => {
    if (!isJoined) { alert("입장 먼저"); return; }
    if (state.phase !== "OPEN") { alert("OPEN에서만"); return; }
    if (!state.dealerId) { alert("딜러 없음"); return; }
    broadcast("clear_request", { toDealer: state.dealerId, round: state.round });
  };

  bRed.onclick = () => placeSide("레드", numsRed(), PAY.evenmoney);
  bBlack.onclick = () => placeSide("블랙", numsBlack(), PAY.evenmoney);
  bOdd.onclick = () => placeSide("홀", numsOdd(), PAY.evenmoney);
  bEven.onclick = () => placeSide("짝", numsEven(), PAY.evenmoney);
  bD1.onclick = () => placeSide("1-12", numsDozen(1,12), PAY.dozen);
  bD2.onclick = () => placeSide("13-24", numsDozen(13,24), PAY.dozen);
  bD3.onclick = () => placeSide("25-36", numsDozen(25,36), PAY.dozen);
  bC1.onclick = () => placeSide("1열", numsColumn(1), PAY.column);
  bC2.onclick = () => placeSide("2열", numsColumn(2), PAY.column);
  bC3.onclick = () => placeSide("3열", numsColumn(3), PAY.column);

  dOpen.onclick = () => dealerSetPhase("OPEN");
  dClose.onclick = () => dealerSetPhase("CLOSED");

  dSpin.onclick = () => {
    if (!isDealer()) { alert("딜러 권한 없음(잠금 해제 필요)"); return; }
    if (state.phase !== "CLOSED") { alert("마감 후 결과 확정"); return; }
    if (!dResult.value) { alert("결과 선택"); return; }

    const r = dResult.value;
    broadcast("spin", { result: r, round: state.round });
    setTimeout(() => {
      settleAll(r);
      broadcast("state_sync", { state });
    }, 1200);
  };

  dNext.onclick = () => {
    if (!isDealer()) { alert("딜러 권한 없음(잠금 해제 필요)"); return; }
    startNextRound();
    broadcast("state_sync", { state });
  };

  dResult.onchange = () => renderState();

  // ===== Broadcast receive =====
  bc.onmessage = (ev) => {
    const msg = ev.data || {};
    const { type, payload, from } = msg;

    if (type === "hard_reset"){
      state = defaultState();
      saveState(state);
      renderState();
      return;
    }

    if (type === "state_sync"){
      const incoming = payload?.state;
      if (incoming && (incoming.updatedAt ?? 0) >= (state.updatedAt ?? 0)){
        state = incoming;
        saveState(state);
        renderState();
      }
      return;
    }

    if (type === "spin"){
      const r = payload?.result;
      if (!r) return;
      spinToResult(r);
      return;
    }

    if (type === "bet_request"){
      dealerAcceptBet(from, payload);
      return;
    }

    if (type === "bet_reply"){
      if (payload?.to !== myId) return;
      if (!payload.ok){ alert(payload.message || "배팅 실패"); return; }
      if (payload.state){
        state = payload.state;
        saveState(state);
      }
      renderState();
      return;
    }

    if (type === "clear_request"){
      if (!isDealer()) return;
      if (payload?.toDealer !== myId) return;
      if (payload?.round !== state.round) return;

      const p = state.players[from];
      if (p){
        p.bets = [];
        saveState(state);
        broadcast("state_sync", { state });
        broadcast("bet_reply", { ok:true, to:from, message:"배팅 초기화됨", state });
      }
      return;
    }
  };

  // ===== Init =====
  function init(){
    renderWheel();
    renderGrid();
    renderDealerResultOptions();

    myRole = elRole.value;
    dealerCard.style.display = (myRole === "dealer") ? "block" : "none";

    // PIN 상태 초기 표시
    updateDealerLockUI();

    renderState();
  }

  init();
})();
</script>
</body>
</html>
