<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>American Roulette</title>
  <style>
    :root{
      --bg:#0b0f14; --fg:#e5e7eb; --mut:#94a3b8;
      --card:rgba(255,255,255,.03); --line:rgba(255,255,255,.10);
      --btn:rgba(255,255,255,.06); --btnLine:rgba(255,255,255,.12);
      --warn:#f59e0b; --ok:#22c55e; --bad:#ef4444;
    }
    body{font-family:system-ui,Segoe UI,Roboto,"Noto Sans KR"; background:var(--bg); color:var(--fg); margin:0; padding:16px;}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .space{justify-content:space-between;}
    .card{margin-top:12px; padding:14px; border:1px solid var(--line); border-radius:16px; background:var(--card);}
    .big{font-size:20px; font-weight:1000;}
    .muted{color:var(--mut); font-size:13px;}
    button,input,select{
      padding:10px 12px; border-radius:12px; border:1px solid var(--btnLine);
      background:var(--btn); color:var(--fg); font-weight:900;
    }
    button{cursor:pointer;}
    button:disabled{opacity:.45; cursor:not-allowed;}
    .pill{
      display:inline-flex; gap:8px; align-items:center;
      padding:8px 10px; border-radius:999px;
      border:1px solid var(--btnLine);
      background:rgba(255,255,255,.04);
      font-weight:900;
    }
    .tag{font-size:12px; font-weight:1000; padding:4px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.14);}
    .tag.ok{color:var(--ok); border-color:rgba(34,197,94,.35); background:rgba(34,197,94,.10);}
    .tag.bad{color:var(--bad); border-color:rgba(239,68,68,.35); background:rgba(239,68,68,.10);}
    .tag.warn{color:var(--warn); border-color:rgba(245,158,11,.35); background:rgba(245,158,11,.10);}

    /* Wheel */
    .wheelWrap{ display:flex; justify-content:center; margin-top:10px; }
    .wheelFrame{
      width:320px;height:320px;border-radius:999px;position:relative;overflow:hidden;
      border:2px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.02);
      display:grid;place-items:center;
    }
    .pointer{
      position:absolute; top:-6px; left:50%; transform:translateX(-50%);
      width:0;height:0; border-left:14px solid transparent; border-right:14px solid transparent;
      border-bottom:26px solid var(--warn);
      filter:drop-shadow(0 4px 6px rgba(0,0,0,.5));
      z-index:5;
    }
    .wheel{
      width:292px;height:292px;border-radius:999px;
      box-shadow: inset 0 0 0 10px rgba(0,0,0,.35);
      transform: rotate(0deg);
      transition: transform 1600ms cubic-bezier(.17,.89,.23,1);
      position:relative;
    }
    .sliceLabel{
      position:absolute; left:50%; top:50%; transform-origin:0 0; width:0;height:0;
      pointer-events:none;
    }
    .sliceLabel span{
      display:inline-block; transform:translate(122px,-10px);
      font-size:12px; font-weight:1000; color:rgba(255,255,255,.95);
      text-shadow:0 1px 0 rgba(0,0,0,.55);
    }
    .hub{
      position:absolute; width:110px;height:110px;border-radius:999px; z-index:2;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      border:1px solid rgba(255,255,255,0.10);
      display:grid; place-items:center; text-align:center; padding:10px;
    }
    .hubNum{ font-size:26px; font-weight:1000; color:var(--fg); line-height:1; }
    .hubTag{ margin-top:6px; font-size:12px; font-weight:1000; color:var(--mut); }

    /* Betting grid */
    .grid{display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-top:10px;}
    .cell{
      padding:12px 10px; border-radius:14px; border:1px solid rgba(255,255,255,.10);
      cursor:pointer; user-select:none; text-align:center; font-weight:1000; position:relative;
    }
    .cell.red{background:rgba(239,68,68,.15)}
    .cell.black{background:rgba(17,24,39,.7)}
    .cell.green{background:rgba(34,197,94,.16)}
    .badge{
      position:absolute; right:8px; top:8px; font-size:11px; padding:3px 7px; border-radius:999px;
      border:1px solid rgba(245,158,11,.35); background:rgba(245,158,11,.18); display:none;
    }

    table{width:100%; border-collapse:collapse; margin-top:10px;}
    th,td{padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left;}
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;}
    .sep{height:1px;background:rgba(255,255,255,.08); margin:12px 0;}
  </style>
</head>
<body>
  <div class="row space">
    <div class="row">
      <div class="big">🎲 American Roulette</div>
      <span id="phaseTag" class="tag ok">OPEN</span>
      <div class="muted" id="stateLine">라운드 1 | 결과 -</div>
    </div>
    <div class="row">
      <button id="openBtn">OPEN</button>
      <button id="closeBtn">CLOSE</button>
      <button id="spinBtn">SPIN</button>
      <button id="nextBtn">다음 라운드</button>
      <button id="hardReset">전체 초기화</button>
    </div>
  </div>

  <div class="card">
    <div class="row space">
      <div class="row">
        <div class="pill"><span class="muted">잔액</span><span id="bal">0</span></div>
        <div class="pill"><span class="muted">이번 손익</span><span id="net">0</span></div>
      </div>
      <div class="row">
        <input id="cash" placeholder="금액" inputmode="numeric" />
        <button id="deposit">입금(+)</button>
        <button id="withdraw">회수(-)</button>
        <button id="setbal">설정(=)</button>
      </div>
    </div>

    <div class="wheelWrap">
      <div class="wheelFrame">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <div class="hub">
          <div class="hubNum" id="wheelNum">—</div>
          <div class="hubTag" id="wheelTag">READY</div>
        </div>
      </div>
    </div>

    <div class="muted" style="margin-top:10px" id="log">준비됨.</div>
  </div>

  <div class="card">
    <div class="big">배팅</div>
    <div class="row" style="margin-top:10px;">
      <select id="chip">
        <option value="100">100</option>
        <option value="500">500</option>
        <option value="1000" selected>1000</option>
        <option value="5000">5000</option>
        <option value="10000">10000</option>
      </select>
      <select id="mode">
        <option value="straight">한칸(스트레이트) 36배</option>
        <option value="split">2칸(스플릿) 18배</option>
        <option value="corner">4칸(코너) 9배</option>
      </select>
      <button id="clearBets">배팅 초기화</button>
    </div>

    <div class="row" style="margin-top:10px;">
      <button id="bRed">레드 2배</button>
      <button id="bBlack">블랙 2배</button>
      <button id="bOdd">홀 2배</button>
      <button id="bEven">짝 2배</button>
      <button id="bD1">1-12 3배</button>
      <button id="bD2">13-24 3배</button>
      <button id="bD3">25-36 3배</button>
      <button id="bC1">1열 3배</button>
      <button id="bC2">2열 3배</button>
      <button id="bC3">3열 3배</button>
    </div>

    <div class="row" style="margin-top:12px;">
      <div class="cell green" data-n="0" style="flex:1">0<span class="badge"></span></div>
      <div class="cell green" data-n="00" style="flex:1">00<span class="badge"></span></div>
    </div>
    <div class="grid" id="grid"></div>

    <div class="card" style="margin-top:12px;">
      <div class="big">배팅 내역(이번 라운드)</div>
      <div class="muted mono" id="betsText">-</div>
    </div>
  </div>

<script>
(() => {
  // ===== Data =====
  const REDS = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
  const PAY = { straight:36, split:18, corner:9, evenmoney:2, dozen:3, column:3 };
  const WHEEL_ORDER = ["0","28","9","26","30","11","7","20","32","17","5","22","34","15","3","24","36","13","1","00","27","10","25","29","12","8","19","31","18","6","21","33","16","4","23","35","14","2"];

  const LS = "roulette_solo_v1";
  const now = () => Date.now();
  const fmt = n => Number(n).toLocaleString("ko-KR");

  function colorOf(n){
    if (n==="0"||n==="00") return "GREEN";
    return REDS.has(Number(n)) ? "RED" : "BLACK";
  }
  function gridColor(n){
    if (n==="0"||n==="00") return "green";
    return REDS.has(Number(n)) ? "red" : "black";
  }
  function posOf(n){
    const x = Number(n); const idx = x-1;
    return { r: Math.floor(idx/3), c: idx%3 };
  }
  function isAdj(a,b){
    const pa=posOf(a), pb=posOf(b);
    const dr=Math.abs(pa.r-pb.r), dc=Math.abs(pa.c-pb.c);
    return (dr===0&&dc===1)||(dr===1&&dc===0);
  }
  function parseMoney(s){
    const n = Number(String(s).replace(/[^\d.-]/g,""));
    return Number.isFinite(n) ? Math.trunc(n) : NaN;
  }

  const defaultState = () => ({
    ver: 1,
    round: 1,
    phase: "OPEN",   // OPEN | CLOSED | SETTLED
    result: null,
    balance: 0,
    net: 0,
    bets: [] // {label, nums:[...], amount, multiplier}
  });

  let state = load();

  function load(){
    try{
      const raw = localStorage.getItem(LS);
      if (!raw) return defaultState();
      const s = JSON.parse(raw);
      if (!s || s.ver !== 1) return defaultState();
      return s;
    } catch {
      return defaultState();
    }
  }
  function save(){
    localStorage.setItem(LS, JSON.stringify(state));
  }

  // ===== UI =====
  const phaseTag = document.getElementById("phaseTag");
  const stateLine = document.getElementById("stateLine");
  const balEl = document.getElementById("bal");
  const netEl = document.getElementById("net");
  const logEl = document.getElementById("log");

  const openBtn = document.getElementById("openBtn");
  const closeBtn = document.getElementById("closeBtn");
  const spinBtn = document.getElementById("spinBtn");
  const nextBtn = document.getElementById("nextBtn");
  const hardReset = document.getElementById("hardReset");

  const cash = document.getElementById("cash");
  const deposit = document.getElementById("deposit");
  const withdraw = document.getElementById("withdraw");
  const setbal = document.getElementById("setbal");

  const chipEl = document.getElementById("chip");
  const modeEl = document.getElementById("mode");
  const clearBets = document.getElementById("clearBets");

  const bRed = document.getElementById("bRed");
  const bBlack = document.getElementById("bBlack");
  const bOdd = document.getElementById("bOdd");
  const bEven = document.getElementById("bEven");
  const bD1 = document.getElementById("bD1");
  const bD2 = document.getElementById("bD2");
  const bD3 = document.getElementById("bD3");
  const bC1 = document.getElementById("bC1");
  const bC2 = document.getElementById("bC2");
  const bC3 = document.getElementById("bC3");

  const gridEl = document.getElementById("grid");
  const betsText = document.getElementById("betsText");

  const wheel = document.getElementById("wheel");
  const wheelNum = document.getElementById("wheelNum");
  const wheelTag = document.getElementById("wheelTag");
  let wheelAngle = 0;

  // ===== Wheel render =====
  function renderWheel(){
    const slice = 360 / WHEEL_ORDER.length;
    const stops = [];
    for (let i=0;i<WHEEL_ORDER.length;i++){
      const n = WHEEL_ORDER[i];
      const c = (n==="0"||n==="00")
        ? "rgba(34,197,94,.85)"
        : (REDS.has(Number(n)) ? "rgba(239,68,68,.85)" : "rgba(17,24,39,.92)");
      stops.push(`${c} ${(i*slice).toFixed(4)}deg ${((i+1)*slice).toFixed(4)}deg`);
    }
    wheel.style.background = `conic-gradient(from -90deg, ${stops.join(",")})`;

    wheel.innerHTML = "";
    for (let i=0;i<WHEEL_ORDER.length;i++){
      const n = WHEEL_ORDER[i];
      const lbl = document.createElement("div");
      lbl.className = "sliceLabel";
      lbl.style.transform = `translate(-50%,-50%) rotate(${(-90 + i*slice)}deg)`;
      const s = document.createElement("span");
      s.textContent = n;
      lbl.appendChild(s);
      wheel.appendChild(lbl);
    }
  }

  function spinToResult(result){
    const r = String(result);
    const idx = WHEEL_ORDER.indexOf(r);
    if (idx < 0) return;

    const slice = 360 / WHEEL_ORDER.length;
    const target = (360 - (idx * slice)) % 360;
    const extraTurns = 5 * 360;

    wheelAngle = (Math.floor(wheelAngle/360) * 360) + extraTurns + target;
    wheel.style.transform = `rotate(${wheelAngle}deg)`;
    wheelNum.textContent = r;
    wheelTag.textContent = colorOf(r);
  }

  // ===== Grid =====
  function renderGrid(){
    gridEl.innerHTML = "";
    for (let i=1;i<=36;i++){
      const n = String(i);
      const div = document.createElement("div");
      div.className = `cell ${gridColor(n)}`;
      div.dataset.n = n;
      div.textContent = n;
      const badge = document.createElement("span");
      badge.className = "badge";
      div.appendChild(badge);
      div.addEventListener("click", () => placeOnNumber(n));
      gridEl.appendChild(div);
    }
    document.querySelectorAll('[data-n="0"],[data-n="00"]').forEach(el=>{
      el.addEventListener("click", ()=> placeOnNumber(el.dataset.n));
    });
  }

  // ===== Bets + badges =====
  const localTotals = new Map();
  function recomputeBadges(){
    localTotals.clear();
    for (const b of state.bets){
      for (const n of b.nums){
        localTotals.set(n, (localTotals.get(n)||0) + b.amount);
      }
    }
    document.querySelectorAll(".cell").forEach(cell=>{
      const n = cell.dataset.n;
      const badge = cell.querySelector(".badge");
      const v = localTotals.get(n) || 0;
      if (v>0){ badge.style.display="inline-block"; badge.textContent=fmt(v); }
      else { badge.style.display="none"; badge.textContent=""; }
    });
  }

  function renderBetsText(){
    betsText.textContent = state.bets.length
      ? state.bets.map(b => `${b.label} | x${b.multiplier} | ${fmt(b.amount)} | [${b.nums.join(",")}]`).join("\n")
      : "-";
  }

  function totalBetAmount(){
    return state.bets.reduce((s,b)=>s+b.amount,0);
  }

  function canBet(){
    return state.phase === "OPEN";
  }

  function ensureBettable(){
    if (!canBet()) { alert("지금은 배팅 시간이 아님."); return false; }
    return true;
  }

  function addBet(bet){
    if (!ensureBettable()) return;

    const amount = Number(bet.amount);
    if (!Number.isFinite(amount) || amount <= 0) { alert("금액 오류"); return; }

    // 잔액 부족 막고 싶으면 이 줄 켜면 됨.
    if (state.balance < totalBetAmount() + amount){
      alert("잔액 부족");
      return;
    }

    // 0/00은 evenmoney/dozen/column 불가
    if ((bet.multiplier === PAY.evenmoney || bet.multiplier === PAY.dozen || bet.multiplier === PAY.column) &&
        (bet.nums.includes("0") || bet.nums.includes("00"))){
      alert("0/00은 해당 배팅 불가");
      return;
    }

    state.bets.push({
      label: String(bet.label).slice(0,40),
      nums: bet.nums.map(String),
      amount,
      multiplier: Number(bet.multiplier)
    });
    save();
    logEl.textContent = `배팅 추가: ${bet.label} (${fmt(amount)})`;
    render();
  }

  // side sets
  const numsRed = () => Array.from({length:36},(_,i)=>String(i+1)).filter(x=>REDS.has(Number(x)));
  const numsBlack = () => Array.from({length:36},(_,i)=>String(i+1)).filter(x=>!REDS.has(Number(x)));
  const numsOdd = () => Array.from({length:36},(_,i)=>String(i+1)).filter(x=>Number(x)%2===1);
  const numsEven = () => Array.from({length:36},(_,i)=>String(i+1)).filter(x=>Number(x)%2===0);
  const numsDozen = (a,b) => Array.from({length:b-a+1},(_,i)=>String(a+i));
  const numsColumn = (col) => {
    const out=[]; for(let n=1;n<=36;n++) if(((n-1)%3)===(col-1)) out.push(String(n));
    return out;
  };

  function placeSide(label, nums, multiplier){
    addBet({ label, nums, amount:Number(chipEl.value), multiplier });
  }

  let splitFirst = null;
  function placeOnNumber(n){
    if (!ensureBettable()) return;

    const mode = modeEl.value;
    const amount = Number(chipEl.value);

    if (mode === "straight"){
      addBet({ label:`스트레이트[${n}]`, nums:[n], amount, multiplier: PAY.straight });
      return;
    }

    if (mode === "split"){
      if (n==="0"||n==="00"){ alert("0/00 스플릿 불가"); return; }
      if (!splitFirst){
        splitFirst = n;
        logEl.textContent = `스플릿 1번째 선택: ${splitFirst} (인접 숫자 1개 더 클릭)`;
        return;
      }
      const a=splitFirst; splitFirst=null;
      if (!isAdj(a,n)){ alert(`${a} 와 ${n} 은 인접이 아님`); return; }
      const nums=[a,n].sort((x,y)=>Number(x)-Number(y));
      addBet({ label:`스플릿[${nums.join(",")}]`, nums, amount, multiplier: PAY.split });
      return;
    }

    if (mode === "corner"){
      if (n==="0"||n==="00"){ alert("0/00 코너 불가"); return; }
      const p = posOf(n);
      if (p.c>=2 || p.r>=11){ alert(`${n}은 코너 기준점 불가`); return; }
      const nn=Number(n);
      const nums=[String(nn),String(nn+1),String(nn+3),String(nn+4)];
      addBet({ label:`코너[${nums.join(",")}]`, nums, amount, multiplier: PAY.corner });
      return;
    }
  }

  // ===== Phase control =====
  function setPhase(phase){
    state.phase = phase;
    save();
    render();
  }

  function settle(result){
    const r = String(result);
    state.result = r;

    let totalBet = 0;
    let totalPay = 0;

    for (const b of state.bets){
      totalBet += b.amount;
      const win = b.nums.includes(r);
      if (win) totalPay += b.amount * b.multiplier;
    }

    const net = totalPay - totalBet;
    state.balance += net;
    state.net = net;
    state.phase = "SETTLED";
    save();

    logEl.textContent = `결과 ${r} (${colorOf(r)}) | 배팅 ${fmt(totalBet)} | 당첨 ${fmt(totalPay)} | 손익 ${(net>=0?"+":"")}${fmt(net)}`;
    render();
  }

  function randomResult(){
    // American: 0,00 + 1..36 => 38칸 동등 랜덤
    const all = ["0","00", ...Array.from({length:36},(_,i)=>String(i+1))];
    return all[Math.floor(Math.random()*all.length)];
  }

  // ===== Cash ops =====
  function cashOp(op){
    const amt = parseMoney(cash.value);
    if (!Number.isFinite(amt) || amt < 0) { alert("금액 오류"); return; }
    if (op === "deposit") state.balance += amt;
    if (op === "withdraw") state.balance -= amt;
    if (op === "set") state.balance = amt;
    save();
    render();
  }

  // ===== Render =====
  function render(){
    // tags
    phaseTag.className = "tag " + (state.phase==="OPEN" ? "ok" : state.phase==="CLOSED" ? "warn" : "bad");
    phaseTag.textContent = state.phase;

    stateLine.textContent = `라운드 ${state.round} | 결과 ${state.result ?? "-"}`;
    balEl.textContent = fmt(state.balance);
    netEl.textContent = (state.net>=0?"+":"") + fmt(state.net);

    // buttons
    openBtn.disabled = state.phase==="OPEN";
    closeBtn.disabled = state.phase!=="OPEN";
    spinBtn.disabled = state.phase!=="CLOSED";
    nextBtn.disabled = state.phase==="OPEN";
    // bet UI lock
    const betDisabled = state.phase!=="OPEN";
    document.querySelectorAll("#chip,#mode,#clearBets,#bRed,#bBlack,#bOdd,#bEven,#bD1,#bD2,#bD3,#bC1,#bC2,#bC3").forEach(el=>el.disabled = betDisabled);
    document.querySelectorAll(".cell").forEach(el=>{
      el.style.pointerEvents = betDisabled ? "none" : "auto";
      el.style.opacity = betDisabled ? "0.45" : "1";
    });

    renderBetsText();
    recomputeBadges();
  }

  // ===== Events =====
  openBtn.onclick = () => { setPhase("OPEN"); logEl.textContent = "OPEN: 배팅 받기"; };
  closeBtn.onclick = () => { setPhase("CLOSED"); logEl.textContent = "CLOSE: 배팅 마감"; };

  spinBtn.onclick = () => {
    if (state.phase !== "CLOSED") return;
    const r = randomResult();
    // spin animation now, settle after delay
    spinToResult(r);
    setTimeout(() => settle(r), 1200);
  };

  nextBtn.onclick = () => {
    state.round += 1;
    state.phase = "OPEN";
    state.result = null;
    state.net = 0;
    state.bets = [];
    save();
    logEl.textContent = "다음 라운드 시작";
    render();
  };

  hardReset.onclick = () => {
    if (!confirm("정말 전체 초기화?")) return;
    state = defaultState();
    save();
    logEl.textContent = "초기화 완료";
    wheelNum.textContent = "—";
    wheelTag.textContent = "READY";
    render();
  };

  deposit.onclick = () => cashOp("deposit");
  withdraw.onclick = () => cashOp("withdraw");
  setbal.onclick = () => cashOp("set");

  clearBets.onclick = () => {
    if (!ensureBettable()) return;
    state.bets = [];
    save();
    logEl.textContent = "배팅 초기화";
    render();
  };

  bRed.onclick = () => placeSide("레드", numsRed(), PAY.evenmoney);
  bBlack.onclick = () => placeSide("블랙", numsBlack(), PAY.evenmoney);
  bOdd.onclick = () => placeSide("홀", numsOdd(), PAY.evenmoney);
